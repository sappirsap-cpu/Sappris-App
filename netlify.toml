[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# מסלול ה-AI — מועבר לפונקציה הסודית
[[redirects]]
  from = "/api/ai"
  to = "/.netlify/functions/ai-proxy"
  status = 200

# SPA fallback — כל כתובת לא מוכרת מחזירה את index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
